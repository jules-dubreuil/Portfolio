<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" type="text/css"
        href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css" />
    <link rel="stylesheet" type="text/css"
        href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/fill/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
        rel="stylesheet">
    <title>Infinite Canvas</title>
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #ffffff;
        }

        .header {
            position: sticky;
            top: 0;
            width: 100%;
            font-family: "Inter", sans-serif;
            font-size: 16px;
            font-weight: 300;
            z-index: 1000;
        }

        .navbar {
            width: 100%;
            padding: 16px 12px 8px 12px;
            background-color: white;
            display: flex;
            flex-direction: row;
            box-shadow: rgba(17, 12, 46, 0.15) 0px 48px 100px 0px;
            align-items: center;
        }

        .menu {
            display: flex;
            gap: 48px;
            list-style: none;
            margin-left: 32px;
            margin-top: 0px;
            margin-bottom: 0px;
        }

        .items a {
            display: block;
            text-decoration: none;
            color: inherit;
            position: relative;
            padding-bottom: 4px;
        }

        .items a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 1.5px;
            background: black;
            transition: width 0.25s ease;
        }

        .items a:hover::after,
        .items a.active::after {
            width: 100%;
        }


        .btn-margin-left {
            margin-left: auto;
        }

        /* ===== BUTTONS ===== */
        .btn {
            font-family: "inter", sans-serif;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 4px;
            position: relative;
            overflow: hidden;
            transition: color 0.3s ease;
            z-index: 0;
        }

        .btn::before {
            content: '';
            position: absolute;
            inset: 0;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            z-index: -1;
        }

        .btn:hover::before {
            transform: translateX(0);
        }

        .dark::before {
            background-color: white;
        }

        .dark:hover {
            color: black;
        }

        .dark {
            background-color: black;
            color: white;
        }


        #viewport {
            width: 100%;
            height: 100%;
            overflow: hidden;
            cursor: grab;
        }

        #viewport.grabbing {
            cursor: grabbing;
        }

        #world {
            position: absolute;
            top: 0;
            left: 0;
            will-change: transform;
        }

        .tile {
            position: absolute;
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            gap: 116px;
        }

        .col {
            display: flex;
            flex-direction: column;
            gap: 116px;
            flex-shrink: 0;
        }

        .photo-item {
            position: relative;
            cursor: pointer;
            overflow: hidden;
            border-radius: 2px;
            flex-shrink: 0;
            transition: transform 0.3s cubic-bezier(.16, 1, .3, 1);
        }

        .photo-item:hover {
            transform: scale(1.02);
            z-index: 10;
        }

        .photo-item img {
            display: block;
            width: 100%;
            height: auto;
            pointer-events: none;
            filter: grayscale(1) brightness(0.85) contrast(1.1);
            transition: filter 0.35s ease;
        }

        .photo-item:hover img {
            filter: grayscale(1) brightness(1) contrast(1.1);
        }

        /* ── Lightbox ── */
        #lightbox {
            position: fixed;
            inset: 0;
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(8, 8, 8, 0);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease, background 0.4s ease;
        }

        #lightbox.active {
            opacity: 1;
            pointer-events: all;
            background: rgba(8, 8, 8, 0.96);
        }

        #lb-img-wrap {
            transform: scale(0.93) translateY(10px);
            transition: transform 0.45s cubic-bezier(.16, 1, .3, 1);
            margin-top: 60px;
        }

        #lightbox.active #lb-img-wrap {
            transform: scale(1) translateY(0);
        }

        #lb-img {
            display: block;
            max-width: 80vw;
            max-height: 75vh;
            object-fit: contain;
            border-radius: 2px;
            filter: none;
            box-shadow: 0 40px 120px rgba(0, 0, 0, 0.85);
            transition: opacity 0.2s ease;
        }

        .lb-arrow {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            z-index: 1000;
            background: none;
            border: none;
            cursor: pointer;
            padding: 24px 20px;
            opacity: 0.3;
            transition: opacity 0.2s, transform 0.2s;
        }

        .lb-arrow:hover {
            opacity: 0.9;
        }

        #lb-prev {
            left: 12px;
        }

        #lb-next {
            right: 12px;
        }

        #lb-prev:hover {
            transform: translateY(-50%) translateX(-4px);
        }

        #lb-next:hover {
            transform: translateY(-50%) translateX(4px);
        }

        .lb-arrow svg {
            width: 32px;
            height: 32px;
            stroke: #e8e2d9;
        }

        #lb-dots {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
            z-index: 1000;
        }

        .lb-dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: #444;
            cursor: pointer;
            transition: background 0.2s, transform 0.2s;
        }

        .lb-dot.active {
            background: #e8e2d9;
            transform: scale(1.5);
        }
    </style>
</head>

<body>

    <section class="header">
        <nav class="navbar">
            <ul class="menu">
                <li class="items"><a href="HP.html">HOME</a></li>
                <li class="items"><a href="HP.html#about-me">ABOUT ME</a></li>
                <li class="items"><a href="HP.html#works">WORKS</a></li>
            </ul>
            <section class="btn-margin-left">
                <a href="HP.html#contact" class="btn primary dark">
                    <span>CONTACT</span>
                    <i class="ph ph-arrow-right" style="font-size: 24px;"></i>
                </a>
            </section>
        </nav>
    </section>

    <div id="viewport">
        <div id="world"></div>
    </div>

    <div id="lightbox">
        <button class="lb-arrow" id="lb-prev">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6" />
            </svg>
        </button>
        <div id="lb-img-wrap">
            <img id="lb-img" src="" alt="" />
        </div>
        <button class="lb-arrow" id="lb-next">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="9 18 15 12 9 6" />
            </svg>
        </button>
        <div id="lb-dots"></div>
    </div>

    <script>
        const PHOTOS = [
            { src: "Ressources-IMG/photos/01.jpg" },
            { src: "Ressources-IMG/photos/02.jpg" },
            { src: "Ressources-IMG/photos/03.jpg" },
            { src: "Ressources-IMG/photos/04.jpg" },
            { src: "Ressources-IMG/photos/05.jpg" },
            { src: "Ressources-IMG/photos/06.jpg" },
            { src: "Ressources-IMG/photos/07.jpg" },
            { src: "Ressources-IMG/photos/08.jpg" },
            { src: "Ressources-IMG/photos/09.jpg" },
            { src: "Ressources-IMG/photos/10.jpg" },
            { src: "Ressources-IMG/photos/11.jpg" },
            { src: "Ressources-IMG/photos/12.jpg" },
            { src: "Ressources-IMG/photos/13.jpg" },
            { src: "Ressources-IMG/photos/14.jpg" },
            { src: "Ressources-IMG/photos/15.jpg" },
            { src: "Ressources-IMG/photos/16.jpg" },
            { src: "Ressources-IMG/photos/17.jpg" },
            { src: "Ressources-IMG/photos/18.jpg" },
            { src: "Ressources-IMG/photos/19.jpg" },
            { src: "Ressources-IMG/photos/20.jpg" },
            { src: "Ressources-IMG/photos/21.jpg" },
            { src: "Ressources-IMG/photos/22.jpg" },
            { src: "Ressources-IMG/photos/23.jpg" },
            { src: "Ressources-IMG/photos/24.jpg" },
            { src: "Ressources-IMG/photos/25.jpg" },
            { src: "Ressources-IMG/photos/26.jpg" },
            { src: "Ressources-IMG/photos/27.jpg" },
            { src: "Ressources-IMG/photos/28.jpg" },
            { src: "Ressources-IMG/photos/29.jpg" },
            { src: "Ressources-IMG/photos/30.jpg" },
            { src: "Ressources-IMG/photos/31.jpg" },
            { src: "Ressources-IMG/photos/32.jpg" },
            { src: "Ressources-IMG/photos/33.jpg" },
        ];

        const COL_WIDTH = 280;
        const GAP = 116;
        const NUM_COLS = 4;

        const viewport = document.getElementById('viewport');
        const world = document.getElementById('world');

        let loadedCount = 0;
        const naturalRatios = new Array(PHOTOS.length).fill(null);

        function onAllLoaded() {
            buildCanvas();
            initCanvas();
        }

        PHOTOS.forEach((p, i) => {
            const img = new Image();
            img.onload = () => {
                naturalRatios[i] = img.naturalHeight / img.naturalWidth;
                loadedCount++;
                if (loadedCount === PHOTOS.length) onAllLoaded();
            };
            img.onerror = () => {
                naturalRatios[i] = 3 / 2;
                loadedCount++;
                if (loadedCount === PHOTOS.length) onAllLoaded();
            };
            img.src = p.src;
        });

        let TILE_W = 0;
        let TILE_H = 0;
        let colHeights = [];

        function buildCanvas() {
            const columns = Array.from({ length: NUM_COLS }, () => []);
            colHeights = new Array(NUM_COLS).fill(0);

            PHOTOS.forEach((photo, idx) => {
                const shortest = colHeights.indexOf(Math.min(...colHeights));
                const h = Math.round(COL_WIDTH * naturalRatios[idx]);
                columns[shortest].push({ ...photo, idx, h });
                colHeights[shortest] += h + GAP;
            });

            TILE_W = NUM_COLS * (COL_WIDTH + GAP);
            TILE_H = Math.max(...colHeights);

            world._tileColumns = columns;
        }

        function buildTileElement(columns) {
            const tile = document.createElement('div');
            tile.className = 'tile';

            columns.forEach(col => {
                const colEl = document.createElement('div');
                colEl.className = 'col';
                colEl.style.width = COL_WIDTH + 'px';

                col.forEach(photo => {
                    const item = document.createElement('div');
                    item.className = 'photo-item';
                    item.style.width = COL_WIDTH + 'px';
                    item.style.height = photo.h + 'px';

                    const img = document.createElement('img');
                    img.src = photo.src;
                    img.alt = '';
                    img.draggable = false;
                    img.loading = 'lazy';
                    img.style.width = '100%';
                    img.style.height = '100%';
                    img.style.objectFit = 'cover';

                    item.appendChild(img);
                    item.addEventListener('click', e => {
                        if (hasMoved) { e.stopPropagation(); return; }
                        openLightbox(photo.idx);
                    });

                    colEl.appendChild(item);
                });

                tile.appendChild(colEl);
            });

            return tile;
        }

        const TILE_GRID = 5;
        let tiles = [];

        function initCanvas() {
            tx = (viewport.clientWidth - TILE_W) / 2;
            ty = (viewport.clientHeight - TILE_H) / 2;

            const half = Math.floor(TILE_GRID / 2);
            for (let gy = -half; gy <= half; gy++) {
                for (let gx = -half; gx <= half; gx++) {
                    const el = buildTileElement(world._tileColumns);
                    world.appendChild(el);
                    const t = { el, gx, gy };
                    tiles.push(t);
                    positionTile(t);
                }
            }

            applyTransform();
        }

        function positionTile(t) {
            t.el.style.left = (t.gx * TILE_W) + 'px';
            t.el.style.top = (t.gy * TILE_H) + 'px';
        }

        let tx = 0, ty = 0, scale = 1;
        let isDragging = false, hasMoved = false;
        let startX, startY, startTx, startTy;
        const MIN_SCALE = 0.25, MAX_SCALE = 3;

        function applyTransform() {
            world.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
            recycleTiles();
        }

        function recycleTiles() {
            const vw = viewport.clientWidth / scale;
            const vh = viewport.clientHeight / scale;
            const ox = -tx / scale;
            const oy = -ty / scale;
            const margin = 1;

            tiles.forEach(t => {
                const tileLeft = t.gx * TILE_W;
                const tileTop = t.gy * TILE_H;

                if (tileLeft + TILE_W < ox - TILE_W * margin) {
                    t.gx += TILE_GRID;
                    positionTile(t);
                } else if (tileLeft > ox + vw + TILE_W * margin) {
                    t.gx -= TILE_GRID;
                    positionTile(t);
                }

                if (tileTop + TILE_H < oy - TILE_H * margin) {
                    t.gy += TILE_GRID;
                    positionTile(t);
                } else if (tileTop > oy + vh + TILE_H * margin) {
                    t.gy -= TILE_GRID;
                    positionTile(t);
                }
            });
        }

        // ── Drag ──────────────────────────────────────────────────────
        viewport.addEventListener('mousedown', e => {
            if (e.button !== 0) return;
            isDragging = true;
            hasMoved = false;
            startX = e.clientX; startY = e.clientY;
            startTx = tx; startTy = ty;
            viewport.classList.add('grabbing');
            e.preventDefault();
        });

        window.addEventListener('mousemove', e => {
            if (!isDragging) return;
            const dx = e.clientX - startX;
            const dy = e.clientY - startY;
            if (Math.abs(dx) > 3 || Math.abs(dy) > 3) hasMoved = true;
            tx = startTx + dx;
            ty = startTy + dy;
            applyTransform();
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
            viewport.classList.remove('grabbing');
        });

        // ── Touch ──────────────────────────────────────────────────────
        let touchStart = null, lastPinchDist = null;

        viewport.addEventListener('touchstart', e => {
            if (e.touches.length === 1) {
                touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY, tx, ty };
                hasMoved = false;
            }
        }, { passive: true });

        viewport.addEventListener('touchmove', e => {
            if (e.touches.length === 1 && touchStart) {
                e.preventDefault();
                const dx = e.touches[0].clientX - touchStart.x;
                const dy = e.touches[0].clientY - touchStart.y;
                if (Math.abs(dx) > 3 || Math.abs(dy) > 3) hasMoved = true;
                tx = touchStart.tx + dx;
                ty = touchStart.ty + dy;
                applyTransform();
            } else if (e.touches.length === 2) {
                e.preventDefault();
                const d = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                if (lastPinchDist !== null) {
                    const mx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                    const my = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                    zoomAt(mx, my, d / lastPinchDist);
                }
                lastPinchDist = d;
            }
        }, { passive: false });

        viewport.addEventListener('touchend', () => {
            lastPinchDist = null;
            touchStart = null;
        });

        // ── Wheel ──────────────────────────────────────────────────────
        viewport.addEventListener('wheel', e => {
            e.preventDefault();
            if (!e.ctrlKey && Math.abs(e.deltaX) + Math.abs(e.deltaY) < 80) {
                tx -= e.deltaX * 1.2;
                ty -= e.deltaY * 1.2;
                applyTransform();
                return;
            }
            const factor = e.ctrlKey
                ? Math.exp(-e.deltaY * 0.01)
                : e.deltaY < 0 ? 1.1 : 0.91;
            zoomAt(e.clientX, e.clientY, factor);
        }, { passive: false });

        function zoomAt(cx, cy, factor) {
            const newScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, scale * factor));
            const r = newScale / scale;
            tx = cx - r * (cx - tx);
            ty = cy - r * (cy - ty);
            scale = newScale;
            applyTransform();
        }

        // ── Lightbox ───────────────────────────────────────────────────
        const lightbox = document.getElementById('lightbox');
        const lbImg = document.getElementById('lb-img');
        const lbPrev = document.getElementById('lb-prev');
        const lbNext = document.getElementById('lb-next');
        const lbDots = document.getElementById('lb-dots');
        let currentIdx = 0;

        PHOTOS.forEach((_, i) => {
            const dot = document.createElement('div');
            dot.className = 'lb-dot';
            dot.addEventListener('click', () => goTo(i));
            lbDots.appendChild(dot);
        });

        function openLightbox(idx) {
            currentIdx = idx;
            lbImg.src = PHOTOS[idx].src;
            lightbox.classList.add('active');
            updateDots();
        }

        function closeLightbox() {
            lightbox.classList.remove('active');
            setTimeout(() => { lbImg.src = ''; }, 450);
        }

        function goTo(idx) {
            currentIdx = (idx + PHOTOS.length) % PHOTOS.length;
            lbImg.style.opacity = '0';
            setTimeout(() => {
                lbImg.src = PHOTOS[currentIdx].src;
                lbImg.style.opacity = '1';
            }, 180);
            updateDots();
        }

        function updateDots() {
            document.querySelectorAll('.lb-dot').forEach((d, i) => {
                d.classList.toggle('active', i === currentIdx);
            });
        }

        lbPrev.addEventListener('click', () => goTo(currentIdx - 1));
        lbNext.addEventListener('click', () => goTo(currentIdx + 1));

        // Clic en dehors de l'image pour fermer
        lightbox.addEventListener('click', e => {
            if (e.target === lightbox) closeLightbox();
        });

        document.addEventListener('keydown', e => {
            if (!lightbox.classList.contains('active')) return;
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowLeft') goTo(currentIdx - 1);
            if (e.key === 'ArrowRight') goTo(currentIdx + 1);
        });
    </script>
</body>

</html>
